<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consent Form — Black Craft Custom Tattoos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Caveat:wght@400;500&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="booking.css" />
</head>
<body>
  <div class="demo-banner" id="demo-banner" hidden>
    <span>You're viewing a live demo — this is a sample consent form.</span>
  </div>

  <header class="site-header">
    <div class="header-bar">
      <span class="eyebrow">Consent form</span>
      <span class="header-meta">Before your appointment</span>
    </div>
    <div class="brand">
      <h1 class="wordmark">Black Craft<span>Custom Tattoos</span></h1>
      <p class="brand-script">a few details before we start</p>
    </div>
  </header>

  <main class="booking-main">
    <div class="booking-layout">
      <div class="booking-panel">
        <div class="panel-header">
          <h2 id="consent-title">Your consent form</h2>
        </div>
        <div id="consent-content"><p class="no-slots-msg">Loading…</p></div>
      </div>

      <aside class="booking-side">
        <div class="studio-card">
          <span class="studio-card__label">Your appointment</span>
          <h3 id="appt-name">—</h3>
          <p class="studio-blurb" id="appt-details"></p>
        </div>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <span>Black Craft Custom Tattoos</span>
    <span>Walk-ins welcome when the chair is free</span>
  </footer>

  <script src="consent.js" type="module"></script>
</body>
</html>
